name: Content Drop Pipeline

on:
  push:
    paths:
      - 'content/*.json'

jobs:
  run-content:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need parent commit to diff against

      - name: Find newly added content files
        id: detect
        run: |
          FILES=$(git diff --diff-filter=A --name-only HEAD~1 HEAD -- 'content/*.json' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Detected: $FILES"

      - name: Skip if no new files
        if: steps.detect.outputs.files == ''
        run: |
          echo "No new content files. Exiting."
          exit 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install moviepy==1.0.3
          pip install -r requirements.txt

      - name: Write YouTube token (Arabic channel)
        env:
          YOUTUBE_TOKEN_AR: ${{ secrets.YOUTUBE_TOKEN_JSON_DARKCRIMED_AR }}
        run: echo "$YOUTUBE_TOKEN_AR" > youtube_token_darkcrimed_ar.json

      - name: Write YouTube token (English channel)
        env:
          YOUTUBE_TOKEN_EN: ${{ secrets.YOUTUBE_TOKEN_JSON_DARKCRIMED_EN }}
        run: echo "$YOUTUBE_TOKEN_EN" > youtube_token_darkcrimed_en.json

      - name: Write YouTube token (generic)
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: echo "$YOUTUBE_TOKEN" > youtube_token.json

      - name: Run pipeline for each content file
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY:    ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID_EN: ${{ secrets.ELEVENLABS_VOICE_ID_EN }}
          ELEVENLABS_VOICE_ID_AR: ${{ secrets.ELEVENLABS_VOICE_ID_AR }}
          PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:       ${{ secrets.PIXABAY_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          TIKTOK_CLIENT_KEY:     ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET:  ${{ secrets.TIKTOK_CLIENT_SECRET }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:      ${{ secrets.FACEBOOK_PAGE_ID }}
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN:        ${{ secrets.X_BEARER_TOKEN }}
        run: |
          for FILE in ${{ steps.detect.outputs.files }}; do
            echo "Processing $FILE..."
            python run_content.py "$FILE"
          done

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: content-error-logs
          path: output/publish_log.jsonl
          retention-days: 7
