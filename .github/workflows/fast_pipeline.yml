name: FAST PIPELINE

on:
  workflow_dispatch:

jobs:
  fast-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: fast-pipeline
      cancel-in-progress: true
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PIPELINE_MODE: fast

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core git-lfs
          git lfs install

      - name: Cache pip packages
        uses: actions/cache@v4.2.3
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Cache music assets
        uses: actions/cache@v4.2.3
        with:
          path: assets/music/
          key: music-assets-v1

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip uninstall moviepy -y || true
          pip install moviepy==1.0.3
          pip install yt-dlp
          pip install -r requirements.txt

      - name: Write YouTube token (Arabic channel)
        env:
          YOUTUBE_TOKEN_AR: ${{ secrets.YOUTUBE_TOKEN_JSON_DARKCRIMED_AR }}
        run: echo "$YOUTUBE_TOKEN_AR" > youtube_token_darkcrimed_ar.json

      - name: Write YouTube token (English channel)
        env:
          YOUTUBE_TOKEN_EN: ${{ secrets.YOUTUBE_TOKEN_JSON_DARKCRIMED_EN }}
        run: echo "$YOUTUBE_TOKEN_EN" > youtube_token_darkcrimed_en.json

      - name: Write YouTube token (generic)
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: echo "$YOUTUBE_TOKEN" > youtube_token.json

      - name: Run FAST pipeline
        env:
          PIPELINE_MODE:                     fast
          PYTHONUNBUFFERED:                  "1"
          VIDEOS_PER_DAY:                    "1"
          ENABLE_PREMIUM_INTRO:              "0"
          ANTHROPIC_API_KEY:                 ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY:                      ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY:                    ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY:                    ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY:                ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID_EN:            ${{ secrets.ELEVENLABS_VOICE_ID_EN }}
          ELEVENLABS_VOICE_ID_AR:            ${{ secrets.ELEVENLABS_VOICE_ID_AR }}
          PEXELS_API_KEY:                    ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:                   ${{ secrets.PIXABAY_API_KEY }}
          TELEGRAM_BOT_TOKEN:                ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:                  ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_CLIENT_ID_AR:              ${{ secrets.YOUTUBE_CLIENT_ID_DARKCRIMED }}
          YOUTUBE_CLIENT_SECRET_AR:          ${{ secrets.YOUTUBE_CLIENT_SECRET_DARKCRIMED }}
          YOUTUBE_CLIENT_ID_EN:              ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET_EN:          ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          TIKTOK_CLIENT_KEY:                 ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET:              ${{ secrets.TIKTOK_CLIENT_SECRET }}
          FACEBOOK_ACCESS_TOKEN:             ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:                  ${{ secrets.FACEBOOK_PAGE_ID }}
          X_API_KEY:                         ${{ secrets.X_API_KEY }}
          X_API_SECRET:                      ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:                    ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET:             ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN:                    ${{ secrets.X_BEARER_TOKEN }}
        run: python run_fast.py

      - name: Upload videos as artifacts
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: fast-pipeline-videos-${{ github.run_id }}
          path: |
            output/dark_crime/final/*.mp4
            output/shorts/*.mp4
          retention-days: 3
          if-no-files-found: warn

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: fast-pipeline-error-logs
          path: output/
          retention-days: 3
