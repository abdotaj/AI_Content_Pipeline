name: Daily Content Pipeline

on:
  schedule:
    - cron: '0 4 * * *'   # Dark Crime: 7:00 AM Riyadh (UTC+3 = 04:00 UTC)
  workflow_dispatch:
    inputs:
      channel:
        description: 'Which channel to run (darkcrimed)'
        required: false
        default: 'darkcrimed'

jobs:
  # ── Job 1: Dark Crime Decoded ────────────────────────────────────────────
  dark-crime-pipeline:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.channel == 'darkcrimed' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 480
    concurrency:
      group: dark-crime-pipeline
      cancel-in-progress: true
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ffmpeg-${{ runner.os }}-v1

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core git-lfs
          git lfs install   # ensure user-level hooks; checkout@v4 already pulled LFS objects

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Cache music assets
        uses: actions/cache@v4
        with:
          path: assets/music/
          key: music-assets-v1

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip uninstall moviepy -y || true
          pip install moviepy==1.0.3
          pip install yt-dlp
          pip install openai-whisper
          pip install -r requirements.txt
          python3 -c "import moviepy; print('MoviePy version:', moviepy.__version__)"
          echo "=== Installed packages ==="
          pip show openai groq httpx moviepy edge-tts yt-dlp

      - name: Write YouTube token (Arabic channel)
        env:
          YOUTUBE_TOKEN_AR: ${{ secrets.YOUTUBE_TOKEN_JSON_DARKCRIMED_AR }}
        run: echo "$YOUTUBE_TOKEN_AR" > youtube_token_darkcrimed_ar.json

      - name: Write YouTube token (English channel)
        env:
          YOUTUBE_TOKEN_EN: ${{ secrets.YOUTUBE_TOKEN_JSON_DARKCRIMED_EN }}
        run: echo "$YOUTUBE_TOKEN_EN" > youtube_token_darkcrimed_en.json

      - name: Write YouTube token (generic)
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: echo "$YOUTUBE_TOKEN" > youtube_token.json

      - name: Verify tokens
        run: |
          echo "=== Token files ==="
          ls -la youtube_token_darkcrimed_ar.json youtube_token_darkcrimed_en.json youtube_token.json
          echo "=== AR token channel ==="
          python3 -c "import json; d=json.load(open('youtube_token_darkcrimed_ar.json')); print(d.get('channel_id','MISSING'))"
          echo "=== EN token channel ==="
          python3 -c "import json; d=json.load(open('youtube_token_darkcrimed_en.json')); print(d.get('channel_id','MISSING'))"

      - name: Run Dark Crime pipeline
        env:
          PYTHONUNBUFFERED:                  "1"
          VIDEOS_PER_DAY:                    "1"
          ENABLE_PREMIUM_INTRO:              "0"
          ANTHROPIC_API_KEY:                 ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY:                      ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY:                    ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY:                    ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY:                ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID_EN:            ${{ secrets.ELEVENLABS_VOICE_ID_EN }}
          ELEVENLABS_VOICE_ID_AR:            ${{ secrets.ELEVENLABS_VOICE_ID_AR }}
          PEXELS_API_KEY:                    ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:                   ${{ secrets.PIXABAY_API_KEY }}
          TELEGRAM_BOT_TOKEN:                ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:                  ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_CLIENT_ID_AR:              ${{ secrets.YOUTUBE_CLIENT_ID_DARKCRIMED }}
          YOUTUBE_CLIENT_SECRET_AR:          ${{ secrets.YOUTUBE_CLIENT_SECRET_DARKCRIMED }}
          YOUTUBE_CLIENT_ID_EN:              ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET_EN:          ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          TIKTOK_CLIENT_KEY:                 ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET:              ${{ secrets.TIKTOK_CLIENT_SECRET }}
          FACEBOOK_ACCESS_TOKEN:             ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:                  ${{ secrets.FACEBOOK_PAGE_ID }}
          X_API_KEY:                         ${{ secrets.X_API_KEY }}
          X_API_SECRET:                      ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:                    ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET:             ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN:                    ${{ secrets.X_BEARER_TOKEN }}
        run: python run_darkcrimed.py

      - name: Upload all videos as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark-crime-videos-${{ github.run_id }}
          path: |
            output/dark_crime/final/*.mp4
            output/shorts/*.mp4
            output/dark_crime/manifest_*.json
          retention-days: 5
          if-no-files-found: warn

      - name: Upload shorts as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark-crime-shorts-${{ github.run_id }}
          path: output/shorts/*.mp4
          retention-days: 5
          if-no-files-found: warn

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dark-crime-error-logs
          path: output/dark_crime/
          retention-days: 7

