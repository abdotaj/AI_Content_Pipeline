name: Daily Content Pipeline

on:
  schedule:
    - cron: '0 4 * * *'   # 7:00 AM Riyadh time (UTC+3 = 04:00 UTC)
  workflow_dispatch:        # allows you to run manually from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (for moviepy/ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run content pipeline
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY:    ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID:   ${{ secrets.ELEVENLABS_VOICE_ID }}
          PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          TIKTOK_SESSION_ID:     ${{ secrets.TIKTOK_SESSION_ID }}
        run: python main.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: output/run.log
          retention-days: 7
